name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build release APK + AAB
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Stage artifacts
        run: |
          mkdir -p artifacts
          TAG="${{ steps.tag.outputs.name }}"
          cp android/app/build/outputs/apk/debug/app-debug.apk "artifacts/spbchurch-radio-${TAG}-debug.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "artifacts/spbchurch-radio-${TAG}-release.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "artifacts/spbchurch-radio-${TAG}-release.aab"
          ls -la artifacts/

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spbchurch-radio-${{ steps.tag.outputs.name }}
          path: artifacts/
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: SPBChurch Radio ${{ steps.tag.outputs.name }}
          body: |
            Android build of [SPBChurch Radio](https://github.com/Slakwik/spbchurch-radio).

            **Что в этом релизе:**
            - `*-debug.apk` — для разработки / установки с adb
            - `*-release.apk` — для sideload-установки (APK-mirror, прямая раздача)
            - `*-release.aab` — Android App Bundle для Google Play

            Если секреты подписи не сконфигурированы в репозитории, release-сборки подписаны debug-ключом и подойдут только для тестов. Для публикации в Play необходим собственный keystore — см. `RELEASE.md`.
          files: artifacts/*
          draft: false
          prerelease: false
